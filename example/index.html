<html>
  <head>
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type"/>
    <title>ShaderCanvas Demo</title>
    <style>
      body {
        margin: 0;
        background: #1a1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        color: #e0e0e0;
      }
      h1 {
        margin-bottom: 0.5em;
        font-weight: 300;
        letter-spacing: 0.05em;
      }
      h1 a {
        color: #e0e0e0;
        text-decoration: none;
      }
      h1 a:hover {
        text-decoration: underline;
      }
      canvas {
        border-radius: 8px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      }
      #editor-container {
        margin-top: 1em;
        width: 640px;
      }
      #editor-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5em;
      }
      #editor-toolbar label {
        font-size: 0.9em;
        opacity: 0.7;
      }
      #compile-btn {
        padding: 6px 20px;
        background: #4a6fa5;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.9em;
      }
      #compile-btn:hover {
        background: #5a8fd5;
      }
      #editor {
        width: 100%;
        height: 300px;
        background: #282c34;
        color: #abb2bf;
        border: none;
        border-radius: 8px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.5);
        font-family: monospace;
        font-size: 13px;
        padding: 12px;
        box-sizing: border-box;
        resize: vertical;
      }
      #error-box {
        margin-top: 0.5em;
        padding: 8px 12px;
        background: #3a1a1a;
        color: #ff6b6b;
        border-radius: 6px;
        font-family: monospace;
        font-size: 0.85em;
        white-space: pre-wrap;
        display: none;
      }
    </style>
  </head>
  <body>
    <h1><a href="https://github.com/hmeyer/shadercanvas">ShaderCanvas</a> Demo</h1>
    <canvas id="canvas" height="400" width="640"></canvas>
    <div id="editor-container">
      <div id="editor-toolbar">
        <label>Fragment Shader (GLSL) &mdash; Ctrl+Enter to compile</label>
        <button id="compile-btn">Compile</button>
      </div>
      <textarea id="editor" spellcheck="false"></textarea>
      <div id="error-box"></div>
    </div>

    <link data-trunk rel="copy-file" href="./editor.js"/>
    <script type="module" src="./editor.js"></script>
  </body>
</html>
